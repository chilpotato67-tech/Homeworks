global:
  resolve_timeout: 1m

route:
  group_by:
    - alertname
    - job
    - instance
  group_wait: 5s
  group_interval: 10s
  repeat_interval: 2m
  receiver: telegram

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: "REPLACE_WITH_YOUR_TELEGRAM_BOT_TOKEN"
        chat_id: 1917272100
        parse_mode: HTML
        send_resolved: true
        message: '{{ template "telegram.default.message" . }}'

templates:
  - /etc/alertmanager/templates/*.tmpl

