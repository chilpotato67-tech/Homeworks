groups:
  - name: homework27-alerts
    rules:
      - alert: LowDiskFreeSpace
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|overlay",mountpoint!~"/parent-distro.*"}
            /
            node_filesystem_size_bytes{fstype!~"tmpfs|overlay",mountpoint!~"/parent-distro.*"}
          ) * 100 < 15
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Low free disk space on node-exporter"
          description: "Free disk space is below 15 percent."

      - alert: CAdvisorDown
        expr: up{job="cadvisor"} == 0
        for: 15s
        labels:
          severity: critical
        annotations:
          summary: "cAdvisor container is down"
          description: "Prometheus cannot scrape cAdvisor. Docker container monitoring is not available."
