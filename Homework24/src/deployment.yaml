apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-random-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: python-random
  template:
    metadata:
      labels:
        app: python-random
    spec:
      containers:
        - name: python-random
          image: duckdogduc/hm24:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082