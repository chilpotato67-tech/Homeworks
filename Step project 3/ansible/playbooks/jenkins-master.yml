---
- name: Install and configure Jenkins master with Nginx
  hosts: jenkins_master
  become: true

  vars:
    jenkins_keyring_path: /etc/apt/keyrings/jenkins-keyring.asc
    jenkins_repo: "deb [signed-by={{ jenkins_keyring_path }}] https://pkg.jenkins.io/debian-stable binary/"

  handlers:
    - name: restart jenkins
      ansible.builtin.systemd:
        name: jenkins
        state: restarted
        daemon_reload: true

    - name: restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted

    - name: reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - fontconfig
          - openjdk-21-jre
          - ca-certificates
          - curl
          - gnupg
          - nginx
        state: present

    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download Jenkins repository key
      ansible.builtin.get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: "{{ jenkins_keyring_path }}"
        mode: "0644"

    - name: Add Jenkins apt repository
      ansible.builtin.apt_repository:
        repo: "{{ jenkins_repo }}"
        filename: jenkins
        state: present
        update_cache: true

    - name: Install Jenkins
      ansible.builtin.apt:
        name: jenkins
        state: present

    - name: Ensure Jenkins is enabled and started
      ansible.builtin.systemd:
        name: jenkins
        enabled: true
        state: started

    - name: Deploy Nginx config for Jenkins
      ansible.builtin.template:
        src: ../templates/nginx-jenkins.conf.j2
        dest: /etc/nginx/sites-available/jenkins
        owner: root
        group: root
        mode: "0644"
      notify: reload nginx

    - name: Disable default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: reload nginx

    - name: Enable Jenkins Nginx site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/jenkins
        dest: /etc/nginx/sites-enabled/jenkins
        state: link
      notify: reload nginx

    - name: Test Nginx configuration
      ansible.builtin.command: nginx -t
      register: nginx_test
      changed_when: false

    - name: Ensure Nginx is enabled and started
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started

    - name: Read Jenkins initial admin password
      ansible.builtin.slurp:
        src: /var/lib/jenkins/secrets/initialAdminPassword
      register: jenkins_initial_password

    - name: Show Jenkins initial admin password
      ansible.builtin.debug:
        msg: "Jenkins initial admin password: {{ jenkins_initial_password.content | b64decode | trim }}"